# CD Pipeline для развёртывания 1C Syntax Helper MCP Server
# Запускается при создании релиза

name: CD

on:
  release:
    types: [published]
  workflow_dispatch:  # Ручной запуск

jobs:
  # =============================================================================
  # Развёртывание в Docker Hub
  # =============================================================================
  deploy-dockerhub:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/1c-syntax-helper-mcp:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/1c-syntax-helper-mcp:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/1c-syntax-helper-mcp
          readme-filepath: ./README.md

  # =============================================================================
  # Развёртывание в Kubernetes (опционально)
  # =============================================================================
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: deploy-dockerhub
    if: ${{ secrets.KUBE_CONFIG }}  # Только если настроено
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      
      - name: Update deployment image
        run: |
          kubectl set image deployment/1c-syntax-helper-mcp \
            mcp-server=${{ secrets.DOCKERHUB_USERNAME }}/1c-syntax-helper-mcp:${{ github.event.release.tag_name }} \
            --record
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/1c-syntax-helper-mcp --timeout=300s
      
      - name: Verify deployment
        run: |
          kubectl get pods -l app=1c-syntax-helper-mcp
          kubectl get svc 1c-syntax-helper-mcp

  # =============================================================================
  # Уведомление о развёртывании
  # =============================================================================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-dockerhub, deploy-k8s]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy-dockerhub.result }}" == "success" ]; then
            echo "✅ Deployment to Docker Hub successful"
            echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/1c-syntax-helper-mcp:${{ github.event.release.tag_name }}"
          else
            echo "❌ Deployment failed"
            exit 1
          fi
